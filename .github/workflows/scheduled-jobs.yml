name: CorreTop scheduled jobs

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sla:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Run lead SLA sweep
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://corretop.vercel.app/api/internal/sla

  reminders:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Run notification reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://corretop.vercel.app/api/internal/reminders
